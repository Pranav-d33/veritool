name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install z3-solver pytest

      - name: Set up Lean 4
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain=4.30.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          export PATH="$HOME/.elan/bin:$PATH"
          lean --version

      - name: Run all tests
        run: |
          PYTHONPATH="." python -m pytest tests/ -v

      - name: Verify Lean compilation
        run: |
          lean Lean/Policy.lean
          lean Lean/Verify.lean

      - name: Run demo scripts
        run: |
          PYTHONPATH="." python demo_tahoe.py
          PYTHONPATH="." python demo_deletion.py
